<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yumurcak Kitchen: PlateUp Wiki</title>
    <style>
        /* 1. SORUMLULUK: ARKA PLAN (SENİN ATTIĞIN LOBİ GÖRSELİ) */
        body { 
            margin: 0; 
            padding: 0;
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            /* GÖRSELİ BURAYA ÇAKTIK */
            background-image: url('https://i.ibb.co/8DDzK9Md/O-P.webp'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden; /* Sayfa sağa sola kaymasın, lobi sabit kalsın */
        }

        /* 2. SORUMLULUK: ÜST KİMLİK (ŞEFFAF VE ŞIK) */
        .header { 
            margin-top: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.6); 
            padding: 10px 50px;
            border-radius: 15px;
            color: white;
            border: 2px solid #ff4757;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* 3. SORUMLULUK: ANA KUTULAR (SENİN DEDİĞİN GİBİ YUKARIDA) */
        .main-panel { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-top: 60px; /* Kutuları yukarıdaki o stratejik noktaya çektik */
        }

        .nav-button { 
            padding: 25px 50px; 
            font-size: 22px; 
            font-weight: bold;
            cursor: pointer; 
            background: rgba(255, 255, 255, 0.95); 
            color: #2d3436; 
            border: 3px solid #2d3436; 
            border-radius: 12px;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .nav-button:hover { 
            transform: scale(1.1);
            background: #ff4757; 
            color: white;
            border-color: white;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 28px;">🏰 YUMURCAK KITCHEN</h1>
    </div>

    <div class="main-panel">
        <button class="nav-button">[ 👤 KARAKTERLER ]</button>
        <button class="nav-button">[ 🍽️ YEMEKLER ]</button>
    </div>

</body>
</html>
