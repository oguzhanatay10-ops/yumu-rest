<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yumurcak Kitchen: PlateUp Wiki</title>
    <style>
        /* 1. SAHNE: LOBİ ARKA PLANI */
        body { 
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; 
            background-image: url('https://i.ibb.co/8DDzK9Md/O-P.webp'); 
            background-size: cover; background-position: center;
            background-repeat: no-repeat; background-attachment: fixed;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
        }

        /* 2. BAŞLIK */
        .header { 
            margin-top: 20px; background: rgba(0, 0, 0, 0.7); 
            padding: 10px 40px; border-radius: 15px; color: white;
            border: 2px solid #ff4757; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* 3. ANA PANEL (KUTULAR YUKARIDA) */
        .main-panel { 
            display: flex; justify-content: center; gap: 40px; 
            margin-top: 60px; z-index: 10;
        }

        .nav-button { 
            padding: 20px 40px; font-size: 22px; font-weight: bold;
            cursor: pointer; background: rgba(255, 255, 255, 0.95); 
            color: #2d3436; border: 3px solid #2d3436; border-radius: 12px;
            transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .nav-button:hover { background: #ff4757; color: white; border-color: white; }

        /* 4. ALT ALTA FIRLAYAN KARAKTERLER PANELİ */
        #karakter-dropdown {
            display: none; /* Başta gizli */
            flex-direction: column; /* BUTONLARI ALT ALTA DİZER */
            position: absolute;
            top: 215px; 
            background: rgba(45, 52, 54, 0.95);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #ffffff;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 20;
            width: 220px;
        }

        .sub-button {
            padding: 12px; font-size: 16px; font-weight: bold;
            cursor: pointer; background: white; color: #2d3436;
            border: none; border-radius: 6px; transition: 0.2s;
            text-decoration: none; text-align: center;
            display: block;
        }

        .sub-button:hover { background: #ff4757; color: white; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 26px;">🏰 YUMURCAK KITCHEN</h1>
    </div>

    <div class="main-panel">
        <button class="nav-button" id="btn-karakterler" onclick="event.stopPropagation()">[ 👤 KARAKTERLER ]</button>
        <button class="nav-button">[ 🍽️ YEMEKLER ]</button>
    </div>

    <div id="karakter-dropdown" onclick="event.stopPropagation()">
        <a href="chef-cagla.html" class="sub-button">👩‍🍳 ŞEF ÇAĞLA</a>
        <a href="waiter-akin.html" class="sub-button">🤵 GARSON AKIN BEY</a>
    </div>

    <script>
        const btn = document.getElementById('btn-karakterler');
        const dropdown = document.getElementById('karakter-dropdown');

        // Butona basınca alt alta listeyi aç/kapat
        btn.addEventListener('click', () => {
            if (dropdown.style.display === 'flex') {
                dropdown.style.display = 'none';
            } else {
                dropdown.style.display = 'flex';
            }
        });

        // Boşluğa (Body) basınca otomatik kapat
        document.addEventListener('click', () => {
            dropdown.style.display = 'none';
        });
    </script>

</body>
</html>
